<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#fbfaf7" />
    <title>Page not found — Humanfia</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #171714; background: #fbfaf7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; border-top: 4px solid #171714; }
      main { width: min(720px, 100%); }
      p { color: #6d6c65; line-height: 1.7; }
      .eyebrow { font-family: "SFMono-Regular", Consolas, monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 28px 0; font-family: "Avenir Next", "Segoe UI", sans-serif; font-size: clamp(64px, 15vw, 132px); font-weight: 500; letter-spacing: -.07em; line-height: .8; }
      em { color: #3157d8; font-family: Georgia, serif; font-weight: 400; }
      a { display: inline-block; margin-top: 24px; padding: 15px 20px; color: #fbfaf7; background: #171714; border: 1px solid #171714; font-family: "SFMono-Regular", Consolas, monospace; font-size: 11px; letter-spacing: .06em; text-decoration: none; text-transform: uppercase; }
      a:hover { background: #3157d8; border-color: #3157d8; }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Error 404</div>
      <h1>Lost in<br /><em>the loop.</em></h1>
      <p>The page you requested does not exist or may have moved.</p>
      <a href="/">Return home →</a>
    </main>
  </body>
</html>
